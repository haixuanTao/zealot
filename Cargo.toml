# Local dimforge forks — mirrors nexus-rl's workspace patch table so nexus3d
# (and vortx) resolve to the exact sources they're built against there. zealot
# and nexus-rl are sibling checkouts under the same parent dir, so the relative
# paths match. Only consulted when a GPU feature pulls these crates into the graph.
[patch.crates-io]
khal = { path = "../khal/crates/khal" }
khal-derive = { path = "../khal/crates/khal-derive" }
khal-std = { path = "../khal/crates/khal-std" }
khal-builder = { path = "../khal/crates/khal-builder" }
vortx = { path = "../vortx" }
vortx-shaders = { path = "../vortx/vortx-shaders" }
parry3d = { path = "../parry/crates/parry3d" }
rapier3d = { path = "../rapier/crates/rapier3d" }

# Probe rapier foot–ground contact (`--features cpu`).
[[example]]
name = "biped_footcheck"
path = "examples/biped/biped_footcheck.rs"
required-features = ["cpu"]

# FPS benchmark: rapier CPU multibody vs nexus GPU physics (same N envs).
[[example]]
name = "biped_fps"
path = "examples/biped/biped_fps.rs"
required-features = ["cpu", "biped_gpu"]

# Minimal physics-only repro for dimforge/rapier#934 — drop a foot-shaped box at
# various edge/corner tilts and observe whether it tips flat under gravity.
[[example]]
name = "foot_tip_stability"
path = "examples/biped/foot_tip_stability.rs"
required-features = ["cpu"]
