[workspace]
resolver = "2"
members = ["zealot-env", "zealot-rl"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
zealot-env = { path = "zealot-env" }
zealot-rl = { path = "zealot-rl" }

# The workspace root is also a package: it hosts the runnable examples that
# exercise the GPU learning stack (vortx + khal). The examples don't depend on
# zealot-rl yet — they validate the vortx forward/backward/Adam primitives that
# zealot-rl's policy + PPO will be built on.
[package]
name = "zealot"
version.workspace = true
edition.workspace = true
license.workspace = true

# Everything that touches the GPU is gated behind a feature (all off by default)
# because the dimforge stack — vortx and nexus3d — compiles rust-gpu shaders via
# cargo-gpu, which needs a special toolchain. Keeping it optional lets
# `cargo check --workspace` stay green for anyone without that toolchain.
#
#   gpu      — vortx (dimforge's GPU tensor lib): hand-rolled MLP forward/backward
#              + Adam (vortx has no autograd). Used by the tensor examples.
#   pendulum — nexus3d GPU rigid-body physics + rapier3d (CPU-side scene build).
#              Used by the pendulum examples under examples/pendulum/.
#
# vortx/khal/rapier3d are taken from crates.io but redirected to local dimforge
# forks by [patch.crates-io] below — the same forks nexus3d is built against.
[features]
default = []
gpu = ["dep:vortx", "dep:khal"]
pendulum = ["dep:nexus3d", "dep:rapier3d", "dep:pollster", "dep:khal"]
# biped — the LeRobot bipedal on nexus GPU physics + the URDF loader
# (rapier3d-urdf, stl meshes → cheap Obb colliders). Used by the GPU biped examples.
biped = ["pendulum", "dep:rapier3d-urdf", "dep:zealot-env"]
# cpu — the LeRobot bipedal on rapier's CPU multibody (mature floating-base +
# contacts). No nexus / cargo-gpu needed, so it builds and runs on any machine.
# Includes the MuJoCo-XML model loader (roxmltree) — the curated standing model.
cpu = ["dep:rapier3d", "dep:rapier3d-urdf", "dep:zealot-env", "dep:zealot-rl", "dep:roxmltree", "dep:rayon"]
# biped_gpu — biped on nexus GPU physics, MJCF model. Pulls zealot-rl so the
# nexus trainer can build (the smoke example doesn't need it, but it's a
# negligible link-time addition).
biped_gpu = ["pendulum", "dep:roxmltree", "dep:zealot-env", "dep:zealot-rl", "dep:rayon"]
# cuda_backend — additively enables the native-CUDA (cuda-oxide) khal backend on
# the vortx + nexus3d stack, alongside WebGPU. Selected at runtime via BIPED_CUDA=1.
# Used for the all-native end-to-end benchmark (iter_e2e_bench). The cubins are
# embedded at build time via CUDA_OXIDE_SHADERS_PTX_{NEXUS_RBD_SHADERS3D,VORTX_SHADERS}.
cuda_backend = ["gpu", "biped_gpu", "khal/cuda", "nexus3d/cuda", "vortx/cuda"]

[dependencies]
vortx = { version = "0.1", optional = true }
khal = { version = "0.1", features = ["derive", "webgpu"], optional = true }
nexus3d = { path = "../nexus-cuda/crates/nexus3d", features = ["rbd", "from_rapier"], optional = true }
rapier3d = { version = "0.32", optional = true }
rapier3d-urdf = { path = "../rapier/crates/rapier3d-urdf", features = ["stl"], optional = true }
roxmltree = { version = "0.20", optional = true }
rayon = { version = "1", optional = true }
pollster = { version = "0.4", optional = true }
zealot-env = { workspace = true, optional = true }
zealot-rl = { workspace = true, optional = true }

[dev-dependencies]
nalgebra = "0.34"
wgpu = "29"
async-std = { version = "1", features = ["attributes"] }
anyhow = "1"

